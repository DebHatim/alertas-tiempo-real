spring.application.name=alertas

# Configuracion BD MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/alertas}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuracion Apache Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}

# Configuración para serializar los DTOs como JSON
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.hatim.alertas.dto
spring.kafka.consumer.auto-offset-reset=earliest